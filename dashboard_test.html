<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DefenseDoneHub - Live Signals</title>
    <style>
        body { font-family: monospace; background: #121212; color: #00ff00; padding: 20px; }
        h1 { border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
        .alert-card { background: #1a1a1a; border-left: 5px solid; padding: 10px; margin: 10px 0; border-radius: 3px; }
        .HIGH { border-color: #ff0000; color: #ff5555; }
        .MEDIUM { border-color: #ffaa00; color: #ffaa00; }
        #log-container { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>

    <h1>📡 SIGNAL ASSESSMENT MATRIX (LIVE STREAM)</h1>
    <div id="status">Connecting to WebSocket...</div>
    <div id="log-container"></div>

    <script>
        // Connect directly to your running Uvicorn ASGI instance
        const socket = new WebSocket('ws://127.0.0.1:8000/ws/alerts/');

        socket.onopen = function(e) {
            document.getElementById('status').innerText = "🟢 CONNECTED - Streaming Active Compliance Monitor";
            document.getElementById('status').style.color = "#00ff00";
        };

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const container = document.getElementById('log-container');
            
            const alertHtml = `
                <div class="alert-card ${data.severity}">
                    <strong>⚠️ [${data.severity}] ${data.type}</strong><br>
                    <span>Detail: ${data.description}</span><br>
                    <span style="color: #888;">Fix: ${data.remediation}</span>
                </div>
            `;
            container.innerHTML = alertHtml + container.innerHTML;
        };

        socket.onclose = function(e) {
            document.getElementById('status').innerText = "🔴 DISCONNECTED - Stream Terminated";
            document.getElementById('status').style.color = "#ff0000";
        };
    </script>
</body>
</html>
