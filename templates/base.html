{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        {% block title %}
        DefenseDoneHub
        {% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#0d1117;
            color:white;
            font-family:system-ui,-apple-system,sans-serif;
        }

        .navbar{
            background:#161b22;
        }

        .card{
            background:#161b22;
            border:1px solid #30363d;
        }

        .table{
            color:white;
        }

        code{
            color:#ff79c6;
        }

        .gallery-container{
            background:#0d1117;
            border:1px solid #30363d;
            border-radius:6px;
        }

        .gallery-header{
            color:#58a6ff;
            border-bottom:1px solid #30363d;
            font-weight:bold;
        }

        .gallery-img{
            height:180px;
            object-fit:cover;
            border-radius:4px;
            border:1px solid #30363d;
            transition:.2s;
        }

        .gallery-img:hover{
            transform:scale(1.02);
            border-color:#58a6ff;
        }

    </style>

    {% block extra_css %}
    {% endblock %}

</head>

<body>

<nav class="navbar navbar-dark px-3 py-2 border-bottom border-secondary d-flex justify-content-between">

    <span class="navbar-brand font-monospace">

        <i class="bi bi-shield-lock-fill text-success"></i>

        DefenseDoneHub

    </span>

    <div>

        <a href="/" class="btn btn-outline-light btn-sm">Home</a>

        <a href="/soc/" class="btn btn-outline-light btn-sm">SOC</a>

        <a href="/demo/" class="btn btn-success btn-sm">
            Demo
        </a>

    </div>

</nav>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}
{% endblock %}

</body>
</html>
